name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual trigger too

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 60

    steps:
      - name: Free disk space (aggressive)
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h /
          # Remove large pre-installed tools not needed for this build
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /opt/microsoft || true
          sudo rm -rf /usr/local/graalvm || true
          docker system prune -af --volumes || true
          sudo apt-get clean || true
          echo "=== Disk space AFTER cleanup ==="
          df -h /

      - name: Add swap space
        run: |
          # Check if swap already exists
          if swapon --show | grep -q '/swapfile'; then
            echo "Swap already active, skipping."
          elif [ -f /swapfile ]; then
            echo "Swapfile exists but not active, activating..."
            sudo swapon /swapfile || true
          else
            sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          echo "Swap status:"
          swapon --show

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js app + clean + OpenNext CF bundle
        run: npm run build:cf
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://www.kolkatacabservice.com

      - name: Check disk space after build
        run: df -h /

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          OPEN_NEXT_DEPLOY: 'true'
