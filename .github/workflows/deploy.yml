name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual trigger too

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /opt/microsoft || true
          docker system prune -af --volumes || true
          echo "=== Disk space AFTER cleanup ==="
          df -h /

      - name: Add swap space
        run: |
          if swapon --show | grep -q '/swapfile'; then
            echo "Swap already active, skipping."
          elif [ -f /swapfile ]; then
            echo "Swapfile exists but not active, activating..."
            sudo swapon /swapfile || true
          else
            sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          swapon --show

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js static export
        # build:cf runs: split-routes → generate-sitemaps → generate-static-files → next build
        # Output: ./out/ directory with all static HTML + Pages Functions in ./functions/
        run: npm run build:cf
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://www.kolkatacabservice.com

      - name: Check disk space and output size
        run: |
          df -h /
          echo "=== Output directory size ==="
          du -sh out/ || true
          echo "=== File count in out/ ==="
          find out -type f | wc -l

      - name: Deploy to Cloudflare Pages
        # Deploys ./out/ (static HTML) + ./functions/ (Pages Functions for API routes)
        run: npx wrangler@latest pages deploy out --project-name=kolkata-cab-service --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
