name: Deploy to Cloudflare Workers

on:
  # Auto-deploy disabled until CF_API_TOKEN secret is configured in GitHub repo settings.
  # To enable: add CF_API_TOKEN (Cloudflare API token) and CF_ACCOUNT_ID to GitHub Secrets,
  # then uncomment the push trigger below.
  push:
    branches: [main]
  workflow_dispatch: # Allows manual trigger too

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/share/swift || true
          docker system prune -af || true
          echo "After cleanup:"
          df -h /

      - name: Add swap space
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap added:"
          swapon --show

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js app + OpenNext CF bundle
        run: npm run build:cf
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://www.kolkatacabservice.com

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          OPEN_NEXT_DEPLOY: 'true'
