name = "kolkata-cab-service"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

# OpenNext outputs to .open-next/
main = ".open-next/worker.js"

# Static assets directory
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Domain routes — Cloudflare zone is active (nameservers: damiete/princess.ns.cloudflare.com)
# These routes enable SSL via Cloudflare proxy and route traffic to this Worker
[[routes]]
pattern = "kolkatacabservice.com/*"
zone_name = "kolkatacabservice.com"

[[routes]]
pattern = "www.kolkatacabservice.com/*"
zone_name = "kolkatacabservice.com"

[vars]
NEXT_PUBLIC_SITE_URL = "https://www.kolkatacabservice.com"

[observability]
enabled = true

# NOTE: [build] command intentionally removed.
# GitHub Actions runs `npm run build:cf` explicitly before `wrangler deploy`.
# If [build] were present, wrangler would double-build on every deploy,
# causing the injected static cache to be wiped by the second build.
